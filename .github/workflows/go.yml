name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "**/*.sum"

      - name: Checks
        run: make checks

      - name: Unit Tests
        run: make unit-tests

      - name: Benchmarks
        run: make perf

      - name: Race test
        run: make unit-tests-race
